<style>
    /* تنسيق زر الواتساب العائم */
    .whatsapp-float {
        position: fixed;
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 20px;
        background-color: #25d366;
        color: #fff;
        border-radius: 50px;
        text-align: center;
        font-size: 35px;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.3s ease;
    }

    /* تأثير عند وضع الماوس على الزر */
    .whatsapp-float:hover {
        transform: scale(1.1);
        background-color: #128c7e;
    }

    /* نص صغير يظهر بجانب الزر (اختياري) */
    .tooltip-text {
        position: absolute;
        right: 70px;
        background: #333;
        color: #fff;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 12px;
        white-space: nowrap;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .whatsapp-float:hover .tooltip-text {
        visibility: visible;
        opacity: 1;
    }

    /* ضبط الحجم للموبايل */
    @media (max-width: 768px) {
        .whatsapp-float {
            width: 50px;
            height: 50px;
            bottom: 15px;
            right: 15px;
            font-size: 30px;
        }
    }
</style>
