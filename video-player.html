<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>مشغل أكاديمية حلم نور | الحماية القصوى</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #2c3e50; --accent: #3498db; --danger: #e74c3c; --time-bg: #1a252f; }
        body { background: #f4f7f6; font-family: 'Cairo', sans-serif; user-select: none; margin: 0; padding: 20px; direction: rtl; }

        .player-container { max-width: 900px; margin: auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .lesson-header { text-align: center; padding: 15px; background: #fff; color: var(--main); margin: 0; border-bottom: 1px solid #eee; font-size: 1.2rem; }

        .video-clipper {
            position: relative; 
            width: 100%; 
            padding-top: 56.25%; 
            background: #000; 
            overflow: hidden;
        }

        #mainVideo {
            position: absolute;
            top: -12%; left: -2%;
            width: 104%; height: 125%; 
            border: none;
        }

        .video-shield {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            background: rgba(0,0,0,0);
            cursor: default;
        }

        .external-controls { background: var(--main); padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; position: relative; z-index: 20; }
        .buttons-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center; }

        .time-counter {
            background: var(--time-bg); color: #00ffcc; padding: 8px 15px; border-radius: 8px;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.1rem;
            border: 1px solid #34495e; direction: ltr; min-width: 130px; text-align: center;
        }

        .control-btn { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.2s; font-size: 16px; }
        .control-btn:active { transform: scale(0.95); }
        .control-btn:hover { background: #2980b9; }

        .volume-container { display: flex; align-items: center; gap: 12px; color: white; margin-top: 5px; }
        input[type=range] { cursor: pointer; width: 150px; }
        .error-msg { background: #fff5f5; color: var(--danger); padding: 40px 20px; text-align: center; border: 2px dashed var(--danger); margin: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="player-container">
        <h2 class="lesson-header" id="lessonTitle">جاري تحميل بيانات الحصة...</h2>
        
        <div id="playerArea">
            <div class="video-clipper">
                <div class="video-shield"></div>
                <div id="mainVideo"></div>
            </div>
        </div>

        <div class="external-controls">
            <div class="buttons-group">
                <button class="control-btn" onclick="playVid()">▶️ تشغيل</button>
                <button class="control-btn" onclick="pauseVid()" style="background:var(--danger);">⏸️ إيقاف</button>
                <button class="control-btn" onclick="seek(-10)">⏪ 10ث</button>
                <div class="time-counter" id="timerDisplay">00:00 / 00:00</div>
                <button class="control-btn" onclick="seek(10)">⏩ 10ث</button>
                <button class="control-btn" onclick="window.history.back()" style="background:#7f8c8d;">🔙 خروج</button>
            </div>

            <div class="volume-container">
                <span>🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
                <span>🔊</span>
                <span id="volPercent">100%</span>
            </div>
        </div>
    </div>

    <script>
        let player;
        const urlParams = new URLSearchParams(window.location.search);
        let rawVideoUrl = urlParams.get('video');
        let lessonName = urlParams.get('title') ? decodeURIComponent(urlParams.get('title')) : "مشاهدة الحصة التعليمية";

        document.getElementById('lessonTitle').innerText = lessonName;

        // دالة استخراج الـ ID "الجوكر" - بتشغل أي رابط يوتيوب في العالم
        function extractYoutubeId(url) {
            if (!url) return null;
            // إزالة المسافات وأي تشفير زائد
            url = decodeURIComponent(url).trim();
            
            // Regex مطور للتعامل مع كل الصيغ بما فيها روابط الموبايل والـ Shared والمختصرة
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regExp);
            
            if (match && match[1]) {
                return match[1];
            } else {
                // لو المستخدم حط الـ ID مباشرة (11 حرف)
                return url.length === 11 ? url : null;
            }
        }

        // تحميل مكتبة يوتيوب
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            let vId = extractYoutubeId(rawVideoUrl);
            
            if (!vId) {
                document.getElementById('playerArea').innerHTML = `
                    <div class="error-msg">
                        <h3>⚠️ خطأ في رابط الحصة</h3>
                        <p>تأكد من نسخ رابط يوتيوب صحيح من تطبيق يوتيوب أو المتصفح.</p>
                    </div>`;
                return;
            }

            player = new YT.Player('mainVideo', {
                videoId: vId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'rel': 0,
                    'showinfo': 0,
                    'modestbranding': 1,
                    'iv_load_policy': 3,
                    'disablekb': 1,
                    'fs': 0,
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onError': onPlayerError
                }
            });
        };

        function onPlayerReady(event) {
            setInterval(updateTimer, 1000);
        }

        function onPlayerError(e) {
            document.getElementById('playerArea').innerHTML = `
                <div class="error-msg">
                    <h3>❌ الفيديو غير متاح</h3>
                    <p>تأكد أن الفيديو "عام" أو "غير مدرج" ومفعل به خيار "التضمين" في إعدادات يوتيوب.</p>
                </div>`;
        }

        function formatTime(seconds) {
            let mins = Math.floor(seconds / 60);
            let secs = Math.floor(seconds % 60);
            return (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        function updateTimer() {
            if (player && player.getCurrentTime && player.getDuration) {
                let current = player.getCurrentTime();
                let total = player.getDuration();
                if (total > 0) {
                    document.getElementById('timerDisplay').innerText = formatTime(current) + " / " + formatTime(total);
                }
            }
        }

        function playVid() { if(player && player.playVideo) player.playVideo(); }
        function pauseVid() { if(player && player.pauseVideo) player.pauseVideo(); }
        
        function seek(seconds) {
            if(player && player.getCurrentTime) {
                player.seekTo(player.getCurrentTime() + seconds, true);
            }
        }
        
        function changeVolume(val) {
            if(player && player.setVolume) {
                player.setVolume(val);
                document.getElementById('volPercent').innerText = val + "%";
            }
        }

        // الحماية
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>
</html>
