<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الرقمية | سنتر حلم نور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #2c3e50; --accent: #3498db; --bg: #f8f9fa; --pdf-color: #e74c3c; --link-color: #27ae60; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .navbar { background: var(--main); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; text-decoration: none; padding: 8px 15px; border-radius: 8px; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .level-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 5px solid var(--accent); }
        .level-title { font-size: 1.2rem; font-weight: bold; color: var(--main); margin-bottom: 15px; display: block; }
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .subject-btn { background: #f1f2f6; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; font-weight: bold; color: #555; }
        .subject-btn:hover { background: var(--accent); color: white; }
        .resource-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .info { display: flex; align-items: center; gap: 12px; }
        .icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .pdf-icon { background: #fee2e2; color: #e74c3c; }
        .link-icon { background: #dcfce7; color: #27ae60; }
        .action-btn { text-decoration: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; color: white; font-size: 13px; }
        #resourcesArea { display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <span>المكتبة الرقمية والاختبارات</span>
    <a href="index.html" class="btn-back">🏠 الرئيسية</a>
</div>

<div class="container">
    <div id="selectionArea">
        <h2 style="text-align: center; color: var(--main);">اختر الصف والمادة 📚</h2>
        <div id="levelsContainer"></div>
    </div>

    <div id="resourcesArea">
        <button onclick="resetView()" style="background:#888; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-bottom:15px;">⬅️ العودة للصفوف</button>
        <h2 id="selectedSubjectTitle" style="color: var(--accent);"></h2>
        <h3 style="border-right: 4px solid var(--pdf-color); padding-right: 10px;">📂 المذكرات (PDF)</h3>
        <div id="pdfList"></div>
        <h3 style="border-right: 4px solid var(--link-color); padding-right: 10px; margin-top: 30px;">🔗 الاختبارات والمصادر</h3>
        <div id="linksList"></div>
    </div>
</div>

<script>
    const firebaseURL = 'https://helmy-5b222-default-rtdb.firebaseio.com/tests.json';

    const studyData = [
        { title: "📘 الصف الأول الابتدائي", short: "1ب", subjects: ["عربي", "رياضة", "انجليزي"] },
        { title: "📙 الصف الثالث الابتدائي", short: "3ب", subjects: ["عربي", "رياضة", "انجليزي", "علوم", "دراسات"] },
        { title: "📓 الصف السادس الابتدائي", short: "6ب", subjects: ["عربي", "رياضة", "انجليزي", "علوم", "دراسات"] },
        { title: "📘 الصف الأول الثانوي", short: "1ث", subjects: ["فيزياء", "كيمياء", "عربي", "رياضة"] },
        { title: "📕 الصف الثالث الثانوي", short: "3ث", subjects: ["تاريخ", "جغرافيا", "عربي"] }
    ];

    function init() {
        const container = document.getElementById('levelsContainer');
        studyData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'level-card';
            card.innerHTML = `<span class="level-title">${item.title}</span><div class="subjects-grid">
                ${item.subjects.map(sub => `<button class="subject-btn" onclick="loadContent('${item.short}-${sub}', '${item.title} - ${sub}')">${sub}</button>`).join('')}
            </div>`;
            container.appendChild(card);
        });
    }

    function loadContent(itemKey, fullTitle) {
        document.getElementById('selectionArea').style.display = 'none';
        document.getElementById('resourcesArea').style.display = 'block';
        document.getElementById('selectedSubjectTitle').innerText = fullTitle;
        const pdfList = document.getElementById('pdfList');
        const linksList = document.getElementById('linksList');
        pdfList.innerHTML = "جاري التحميل... 🔄";
        linksList.innerHTML = "";

        fetch(firebaseURL).then(res => res.json()).then(data => {
            pdfList.innerHTML = ""; linksList.innerHTML = "";
            if(!data) return;
            Object.values(data).filter(i => i.cat === itemKey).forEach(item => {
                let btnText = item.type === 'pdf' ? '🔓 فتح الملف' : '📝 دخول الاختبار';
                let icon = item.type === 'pdf' ? '📄' : '🌐';
                if(item.url.includes('youtube') || item.url.includes('youtu.be')) { btnText = "📺 مشاهدة شرح"; icon = "🎥"; }

                const html = `<div class="resource-card"><div class="info">
                    <div class="icon ${item.type === 'pdf' ? 'pdf-icon' : 'link-icon'}">${icon}</div>
                    <div>${item.title}</div></div>
                    <a href="${item.url}" target="_blank" class="action-btn ${item.type === 'pdf' ? 'pdf-btn' : 'link-btn'}">${btnText}</a></div>`;
                if(item.type === 'pdf') pdfList.innerHTML += html; else linksList.innerHTML += html;
            });
        });
    }

    function resetView() { document.getElementById('selectionArea').style.display = 'block'; document.getElementById('resourcesArea').style.display = 'none'; }
    window.onload = init;
</script>
</body>
</html>
