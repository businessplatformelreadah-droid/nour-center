<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>تتبع اشتراكاتك | حلم نور</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card" style="background:white; padding:30px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
            <h1>تتبع حالة اشتراكك 🔍</h1>
            <p style="color:#666; margin-bottom:20px;">أدخل رقم الموبايل لعرض كل حصصك المفعلة</p>
            <input type="text" id="searchPhone" placeholder="أدخل رقم موبايلك هنا" style="width:100%; padding:15px; border-radius:10px; border:2px solid #ddd; font-family:'Cairo'; font-size:18px; text-align:center; outline:none; margin-bottom:15px;">
            <button class="btn-main-hero" style="width:100%" onclick="checkStatus()">بحث عن اشتراكاتي</button>
            
            <div id="resultsArea" style="margin-top:25px;"></div>
        </div>
        <button onclick="location.href='index.html'" class="btn-back">⬅️ العودة للرئيسية</button>
    </div>

    <script>
        // إعداد Supabase
        const SUPABASE_URL = 'https://viutmpktcgceyofuxmus.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_QoIPp4IFBEdES90fNOqbKg_6kIF0GeO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkStatus() {
            // تنظيف رقم الهاتف من أي مسافات
            const phone = document.getElementById('searchPhone').value.trim();
            const resultsArea = document.getElementById('resultsArea');

            if (phone.length < 11) {
                alert("برجاء إدخال رقم موبايل صحيح مكون من 11 رقم");
                return;
            }

            resultsArea.innerHTML = "<p style='color: var(--accent);'>جاري فحص الاشتراكات... 🔄</p>";

            try {
                // 1. البحث عن اشتراكات الطالب
                const { data: subs, error: subError } = await supabaseClient
                    .from('user_subscriptions')
                    .select('*')
                    .eq('phone', phone);

                if (subError) throw subError;

                if (!subs || subs.length === 0) {
                    resultsArea.innerHTML = `
                        <div style="background:#ffebee; color:#c62828; padding:15px; border-radius:10px; border: 1px solid #ef9a9a;">
                            لا توجد اشتراكات مفعلة لهذا الرقم (<b>${phone}</b>) حالياً. 
                            <br><small>تأكد من الرقم، أو تواصل مع الدعم الفني لتفعيل حسابك.</small>
                        </div>`;
                    return;
                }

                resultsArea.innerHTML = "<h3 style='margin-bottom:15px;'>حصصك المتاحة حالياً:</h3>";

                // 2. عرض الدروس لكل قسم
                for (let sub of subs) {
                    await displayCategoryLessons(sub.category, resultsArea);
                }

            } catch (err) {
                console.error("Error details:", err);
                resultsArea.innerHTML = "<p style='color:red'>عذراً، حدث خطأ تقني. يرجى المحاولة لاحقاً.</p>";
            }
        }

        async function displayCategoryLessons(category, container) {
            // إنشاء صندوق القسم
            const sectionBox = document.createElement('div');
            sectionBox.className = "category-card"; // تأكد من وجود ستايل لها أو استخدم الستايل المباشر
            sectionBox.style = "background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:15px; border-right:5px solid var(--accent); text-align:right; box-shadow: 0 2px 5px rgba(0,0,0,0.05);";
            sectionBox.innerHTML = `<h3 style="margin:0 0 10px 0; color:#2c3e50; font-size:18px;">📚 قسم: ${category}</h3>`;
            container.appendChild(sectionBox);

            // جلب الفيديوهات (استخدام trim للقسم لضمان المطابقة)
            const { data: lessons, error: lessonError } = await supabaseClient
                .from('lessons')
                .select('*')
                .eq('category', category.trim());

            if (lessons && lessons.length > 0) {
                // ترتيب الدروس لو حابب (مثلاً بالأحدث أو بالترتيب الأبجدي)
                lessons.forEach((video, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-main-hero';
                    btn.style = "background:linear-gradient(135deg, #3498db, #2980b9); width:100%; margin-bottom:8px; padding:12px; font-size:15px; border:none; color:white; border-radius:10px; cursor:pointer; display:block; text-align:right;";
                    btn.innerHTML = `🎬 حصة (${index + 1}): ${video.title}`;
                    btn.onclick = () => {
                        location.href = `video-player.html?video=${encodeURIComponent(video.url)}&title=${encodeURIComponent(video.title)}`;
                    };
                    sectionBox.appendChild(btn);
                });
            } else {
                sectionBox.innerHTML += `<p style='color:#888; font-size:14px; margin:10px 0 0 0;'>مفعل، بانتظار رفع حصص هذا القسم...</p>`;
            }
        }
    </script>
</body>
</html>
